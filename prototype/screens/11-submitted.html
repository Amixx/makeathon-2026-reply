<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WayTum — 11 Submitted</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<style>
  .q-title { font-size: 26px; font-weight: 800; letter-spacing: -0.7px; line-height: 1.1; text-align: center; }
  .submitted-card {
    background: var(--bg-card);
    border: 1.5px solid var(--success);
    border-radius: 16px;
    padding: 26px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    animation: fadeIn 300ms ease-out;
  }
  .check-circle {
    width: 58px; height: 58px; border-radius: 50%;
    background: var(--success);
    color: white;
    display: inline-flex; align-items: center; justify-content: center;
    animation: popIn 500ms cubic-bezier(.34,1.56,.64,1);
  }
  .submitted-sub {
    font-size: 13px;
    color: var(--fg-muted);
    text-align: center;
    font-family: var(--font-body);
    line-height: 1.4;
  }
  .ts-card {
    background: var(--bg-muted);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .ts-card .head {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-muted); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600;
  }
  .ts-row {
    display: flex; gap: 10px; align-items: flex-start;
    font-size: 13px; line-height: 1.4;
  }
  .ts-row .mk { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .ts-row.done .mk { background: var(--success); }
  .ts-row.soon .mk { background: var(--accent-500); }
  .ts-row.future .mk { background: var(--neutral-300); }
</style>
</head>
<body>
<div class="phone">
  <div id="statusbar"></div>
  <div class="body pad-swipe flex-col gap-16">
    <div class="top-nav">
      <div class="section-label" style="color: var(--success);">DONE</div>
      <span class="counter">Apr 22 · 14:32</span>
    </div>

    <div class="submitted-card fade-in">
      <div class="check-circle">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 class="q-title">Submitted to TUM portal.</h2>
      <p class="submitted-sub">The thing you'd been sitting on for weeks — gone.</p>
    </div>

    <div class="ts-card fade-up delay-1">
      <div class="head">WHAT HAPPENS NEXT</div>
      <div class="ts-row done"><span class="mk"></span><span>Portal confirmation email — within 10 min</span></div>
      <div class="ts-row soon"><span class="mk"></span><span>Calendar reminder · Jul 15 decision</span></div>
      <div class="ts-row future"><span class="mk"></span><span>Next month's check-in — the agent will ask</span></div>
    </div>

    <div class="spacer"></div>

    <button class="btn btn-primary full lg" data-nav="12-event.html">Back to May</button>
  </div>
</div>
<script src="../shared/prototype.js"></script>
<script>
document.getElementById('statusbar').innerHTML = WP.buildStatusBar();
WP.scheduleAdvance(4500, '12-event.html');
</script>
</body>
</html>
