<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WayTum — 07 Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<style>
  .reveal-body { position: relative; color: var(--fg-inverted); }
  .glow {
    position: absolute;
    width: 360px; height: 360px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,82,0.55), transparent 65%);
    top: 30%; left: 50%;
    transform: translate(-50%, -50%);
    filter: blur(30px);
    z-index: 0;
    pointer-events: none;
    animation: glowIn 800ms ease-out;
  }
  @keyframes glowIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  .reveal-inner { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; padding: 60px 28px 40px; }
  .reveal-top {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    margin-bottom: 24px;
  }
  .reveal-top .label { color: var(--accent-400); font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; font-weight: 600; }
  .reveal-top .sub { color: var(--fg-inverted-muted); font-size: 13px; }
  .big-number {
    font-size: 200px; font-weight: 800; color: var(--accent-500);
    line-height: 0.9; letter-spacing: -6px; text-align: center;
  }
  .opps-label {
    font-size: 26px; font-weight: 700; color: white;
    text-align: center;
    margin-top: 8px;
  }
  .quote {
    margin-top: 40px;
    font-style: italic;
    color: var(--fg-inverted-muted);
    font-size: 14px;
    text-align: center;
    line-height: 1.5;
    padding: 0 20px;
  }
  .bottom {
    margin-top: auto;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .progress-bar {
    width: 220px; height: 3px;
    background: var(--primary-800);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%;
    background: var(--accent-500);
    width: 0%;
    animation: fillProgress 2200ms ease-out forwards;
  }
  @keyframes fillProgress {
    from { width: 30%; } to { width: 100%; }
  }
  .opening-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--fg-inverted-muted);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="phone dark">
  <div id="statusbar"></div>
  <div class="body reveal-body" style="height: calc(100% - 54px);">
    <div class="glow"></div>
    <div class="reveal-inner">
      <div class="reveal-top">
        <span class="label">· YOUR MAY</span>
        <span class="sub">shaped around what you said</span>
      </div>
      <div class="big-number" id="big">0</div>
      <div class="opps-label">opportunities</div>
      <div class="quote">"The month you'd normally spend procrastinating — now has five doors open."</div>
      <div class="spacer"></div>
      <div class="bottom">
        <div class="progress-bar"><div class="fill"></div></div>
        <div class="opening-label" id="opening">OPENING…</div>
        <button class="btn btn-accent" data-nav="08-course.html" style="margin-top: 14px; padding: 12px 22px;">
          Open your May
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>
<script src="../shared/prototype.js"></script>
<script>
document.getElementById('statusbar').innerHTML = WP.buildStatusBar({ dark: true });

const big = document.getElementById('big');
let n = 0;
const up = setInterval(() => {
  n++; big.textContent = n;
  if (n >= 5) {
    clearInterval(up);
    big.animate([{ transform:'scale(1)' },{ transform:'scale(1.1)' },{ transform:'scale(1)' }], { duration: 400 });
  }
}, 120);

const opening = document.getElementById('opening');
setTimeout(() => opening.textContent = 'READY.', 2400);
</script>
</body>
</html>
