<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WayTum — 03 Blockers</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<style>
  .q-title { font-size: 26px; font-weight: 800; letter-spacing: -0.7px; line-height: 1.1; }
  .q-sub { font-size: 13px; color: var(--fg-muted); line-height: 1.45; margin-top: 6px; }
</style>
</head>
<body>
<div class="phone">
  <div id="statusbar"></div>
  <div class="body pad-default flex-col gap-14">
    <div class="top-nav">
      <button class="back-btn" data-nav="02-vision.html"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
      <div class="progress-dots">
        <div class="dot done"></div>
        <div class="dot done"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
      </div>
      <span class="counter">02 / 04</span>
    </div>

    <div class="flex-col gap-4">
      <span class="section-label"><span class="dot"></span>WOOP · OBSTACLE</span>
      <h2 class="q-title">What's the part that feels heaviest?</h2>
      <p class="q-sub">Speak what's there. We'll pick out the weight — no scoring.</p>
    </div>

    <div class="orb-wrap">
      <div class="orb"></div>
    </div>

    <div class="flex justify-center">
      <div class="pause-pill">
        <span class="icon">
          <svg width="10" height="12" viewBox="0 0 10 12" fill="currentColor"><rect x="0" y="0" width="3" height="12" rx="1"/><rect x="7" y="0" width="3" height="12" rx="1"/></svg>
        </span>
        <span id="timer">0:00</span>
        <span class="sep">·</span>
        <span>PAUSE</span>
      </div>
    </div>

    <div class="vision-card">
      <span class="section-label"><span class="dot"></span>OBSTACLE · LIVE</span>
      <div class="chips" id="chips"></div>
    </div>

    <div class="spacer"></div>

    <div class="btn-row">
      <button class="btn btn-ghost" data-nav="04-ground.html">Type instead</button>
      <button class="btn btn-primary" data-nav="04-ground.html">Stop & continue</button>
    </div>
  </div>
</div>
<script src="../shared/prototype.js"></script>
<script>
document.getElementById('statusbar').innerHTML = WP.buildStatusBar();
WP.startTimer(document.getElementById('timer'), 30);

const chipSpecs = [
  { text:'AVOIDANCE', cls:'anchor', t: 500 },
  { text:'Prof. Walter email', t: 1400 },
  { text:'not-ready feeling', t: 2400 },
  { text:'comparing to peers', t: 3400 },
  { text:'+ burnout? (forming)', cls:'forming', t: 4500 }
];
const chipsEl = document.getElementById('chips');
chipSpecs.forEach(spec => {
  setTimeout(() => {
    const c = document.createElement('span');
    c.className = 'chip' + (spec.cls ? ' ' + spec.cls : '');
    c.textContent = spec.text;
    chipsEl.appendChild(c);
  }, spec.t);
});

WP.scheduleAdvance(9500, '04-ground.html');
</script>
</body>
</html>
