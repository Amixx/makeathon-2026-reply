<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WayTum — 05 Commitment</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<style>
  .q-title { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; line-height: 1.1; }
  .opt-card {
    background: var(--bg-card);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-xl);
    padding: 18px 20px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer;
    transition: all 150ms ease;
  }
  .opt-card .ico {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--bg-muted);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--fg-default);
    flex-shrink: 0;
  }
  .opt-card.selected {
    border-color: var(--accent-500);
    background: var(--bg-card);
    box-shadow: 0 0 0 1px var(--accent-500);
  }
  .opt-card.selected .ico { background: var(--accent-50); color: var(--accent-700); }
  .opt-card .content { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .opt-card .name { font-size: 15px; font-weight: 700; }
  .opt-card .desc { font-size: 12px; color: var(--fg-muted); }
  .opt-card .hours {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--fg-muted);
  }
  .opt-card.selected .hours { color: var(--accent-600); }
</style>
</head>
<body>
<div class="phone">
  <div id="statusbar"></div>
  <div class="body pad-tight flex-col gap-20">
    <div class="top-nav">
      <button class="back-btn" data-nav="04-ground.html"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
      <div></div>
      <span class="counter">04 / 04</span>
    </div>

    <div class="flex-col gap-6">
      <h2 class="q-title">How much room does May have?</h2>
      <p class="subhead">Pick what's honestly true today.</p>
    </div>

    <div class="flex-col gap-12">
      <div class="opt-card fade-up" data-select="whisper">
        <div class="ico">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5l6.74-6.76z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>
        </div>
        <div class="content">
          <div class="name">Keep me on the map</div>
          <div class="desc">A nudge a week.</div>
        </div>
        <div class="hours">30 MIN</div>
      </div>

      <div class="opt-card selected fade-up delay-1" data-select="steady">
        <div class="ico">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        </div>
        <div class="content">
          <div class="name">Make real moves</div>
          <div class="desc">A tangible step each week.</div>
        </div>
        <div class="hours">2–3 H</div>
      </div>

      <div class="opt-card fade-up delay-2" data-select="push">
        <div class="ico">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/></svg>
        </div>
        <div class="content">
          <div class="name">Big push month</div>
          <div class="desc">Run with what you have.</div>
        </div>
        <div class="hours">5+ H</div>
      </div>
    </div>

    <div class="spacer"></div>

    <button class="btn btn-primary full lg" data-nav="06-swarm.html">
      Continue
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>
</div>
<script src="../shared/prototype.js"></script>
<script>
document.getElementById('statusbar').innerHTML = WP.buildStatusBar();
document.querySelectorAll('.opt-card').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.opt-card').forEach(x => x.classList.remove('selected'));
    c.classList.add('selected');
    WP.cancelAdvance();
  });
});
WP.scheduleAdvance(4500, '06-swarm.html');
</script>
</body>
</html>
