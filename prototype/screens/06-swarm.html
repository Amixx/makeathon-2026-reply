<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waypoint — 06 Agent Swarm</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<style>
  .continue-btn {
    margin-top: 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 320ms ease;
  }
  .continue-btn.ready { opacity: 1; pointer-events: auto; }
  .status-bullet .bullet { opacity: 0; transform: translateY(4px); transition: opacity 260ms ease, transform 260ms ease; }
  .status-bullet .bullet.in { opacity: 1; transform: translateY(0); }
  .agent-card { animation: agentIn 320ms ease-out both; }
</style>
</head>
<body>
<div class="phone">
  <div id="statusbar"></div>
  <div class="body pad-tight scroll flex-col gap-12">
    <div class="top-nav">
      <button class="back-btn" data-nav="05-commitment.html"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
      <div></div>
      <div></div>
    </div>

    <span class="section-label" style="animation: accentPulse 1.2s ease-in-out infinite;"><span class="dot"></span>AGENT SWARM · LIVE</span>

    <div class="flex-col gap-10" id="agents"></div>

    <button class="btn btn-primary full lg continue-btn" id="continueBtn" data-nav="07-reveal.html">
      See what they found
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>
</div>
<script src="../shared/prototype.js"></script>
<script>
document.getElementById('statusbar').innerHTML = WP.buildStatusBar();

const agents = [
  {
    icon: '🛰️', name: 'Study Buddy',
    statuses: ['WORKING','DOING','DOING','DOING'],
    bullets: [
      { text: 'Pulled TUM modules matching Mars robotics' },
      { text: 'Checking IN2320 fits Tue/Thu 14:00…' },
      { text: 'Enroll via TUMonline' }
    ]
  },
  {
    icon: '💼', name: 'Career Agent',
    statuses: ['WORKING','DRAFTING','DRAFTING','DRAFTING'],
    bullets: [
      { text: 'Scanned poliastro for good-first-issues' },
      { text: 'Drafting PR #214 description…' },
      { text: 'Prep changelog snippet for your review' }
    ]
  },
  {
    icon: '🏛️', name: 'University Nav',
    statuses: ['WORKING','WRITING','WRITING','WRITING'],
    bullets: [
      { text: "Pulled Prof. Walter's 2024 publications" },
      { text: 'Composing outreach email (142 words)…' },
      { text: 'Queue for Wed morning (best open rate)' }
    ]
  },
  {
    icon: '🧭', name: 'Extra Scout',
    statuses: ['WORKING','SCHEDULED','SCHEDULED','SCHEDULED'],
    bullets: [
      { text: 'Found ESA/DLR Career Day · May 22' },
      { text: "Checked your calendar — you're free" },
      { text: 'Add to month with 1 tap' }
    ]
  },
  {
    icon: '🎓', name: 'Scholarship', green: true,
    statuses: ['WORKING','DRAFTING','DRAFTING','READY'],
    bullets: [
      { text: 'Matched Deutschlandstipendium criteria' },
      { text: 'Drafted letter from your thesis intro' },
      { text: 'Waiting for your review · due Apr 30', alert: true }
    ]
  }
];

// Tick plan (per bullet in ms since screen mount)
// Each agent works at its own pace to feel parallel.
const tickPlan = [
  [600, 1800, 3100],   // Study Buddy
  [900, 2100, 3600],   // Career Agent
  [700, 2400, 3300],   // University Nav
  [1100, 2700, 4000],  // Extra Scout
  [800, 2200, 3800]    // Scholarship
];

const statusClsMap = {
  WORKING: 'working',
  DOING: 'doing',
  DRAFTING: 'drafting',
  WRITING: 'writing',
  SCHEDULED: 'scheduled',
  READY: 'ready'
};

const cont = document.getElementById('agents');
agents.forEach((a, i) => {
  const el = document.createElement('div');
  el.className = 'agent-card status-bullet' + (a.green ? ' green-border' : '');
  el.style.animationDelay = (i * 90) + 'ms'; // all cards in quickly, small stagger
  el.id = 'agent-' + i;

  const bulletsHtml = a.bullets.map((b, bi) => {
    return `<div class="bullet queued" data-bi="${bi}">
      <span class="marker">○</span><span>${b.text}</span>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="header">
      <div class="flex items-center gap-8"><span class="icon-circle">${a.icon}</span><span class="name">${a.name}</span></div>
      <span class="pill working" data-status>${a.statuses[0]}</span>
    </div>
    ${bulletsHtml}
  `;
  cont.appendChild(el);
});

// Drive per-agent bullet progression
const totalBullets = agents.reduce((n, a) => n + a.bullets.length, 0);
let completedBullets = 0;

agents.forEach((a, i) => {
  const el = document.getElementById('agent-' + i);
  // Reveal all bullets immediately (they start as 'queued' so visible but pending)
  el.querySelectorAll('.bullet').forEach((b, bi) => {
    setTimeout(() => b.classList.add('in'), 160 + i * 90 + bi * 120);
  });

  a.bullets.forEach((b, bi) => {
    // At each tick, advance the current bullet from queued → running → done,
    // then advance the status pill
    const tickAt = tickPlan[i][bi];

    // Mark bullet as running (if not the last one we'll mark done shortly after)
    setTimeout(() => {
      const bEl = el.querySelector(`.bullet[data-bi="${bi}"]`);
      if (!bEl) return;
      bEl.classList.remove('queued');
      bEl.classList.add('running');
      bEl.querySelector('.marker').textContent = '↻';

      // Update agent status pill
      const s = agents[i].statuses[bi + 1] || agents[i].statuses[agents[i].statuses.length - 1];
      const pill = el.querySelector('[data-status]');
      pill.className = 'pill ' + (statusClsMap[s] || 'working');
      pill.textContent = s;
    }, tickAt);

    // After a short delay, mark as done (or alert for the last Scholarship bullet)
    setTimeout(() => {
      const bEl = el.querySelector(`.bullet[data-bi="${bi}"]`);
      if (!bEl) return;
      bEl.classList.remove('running');
      if (b.alert) {
        bEl.classList.add('alert');
        bEl.querySelector('.marker').textContent = '!';
      } else {
        bEl.classList.add('done');
        bEl.querySelector('.marker').textContent = '✓';
      }
      completedBullets++;
      if (completedBullets >= totalBullets) {
        setTimeout(() => document.getElementById('continueBtn').classList.add('ready'), 300);
      }
    }, tickAt + 800);
  });
});
</script>
</body>
</html>
