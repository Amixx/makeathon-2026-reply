<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waypoint — 17 Opportunity Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<style>
  .q-title { font-size: 30px; font-weight: 800; letter-spacing: -0.8px; line-height: 1.05; }
  .letter-card {
    background: var(--bg-card);
    border: 1px solid var(--border-default);
    border-radius: 12px;
    padding: 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .letter-card .head {
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.3px;
    color: var(--accent-600); text-transform: uppercase; font-weight: 700;
  }
  .letter-card .head .ready { color: var(--success); }
  .letter-card blockquote {
    font-size: 13.5px;
    color: var(--fg-default);
    font-style: italic;
    line-height: 1.55;
    padding: 4px 0;
  }
  .letter-card .meta {
    font-size: 11px;
    color: var(--fg-muted);
    font-family: var(--font-mono);
    letter-spacing: 1px;
  }
  .next-card {
    background: var(--bg-muted);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 6px;
    font-size: 13px;
    line-height: 1.5;
  }
  .next-card .head { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.3px; color: var(--accent-600); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
  .next-card .row { display: flex; gap: 8px; }
  .next-card .row .n { color: var(--accent-600); font-family: var(--font-mono); font-weight: 700; min-width: 14px; }
</style>
</head>
<body>
<div class="phone">
  <div id="statusbar"></div>
  <div class="body pad-swipe scroll flex-col gap-14">
    <div class="top-nav">
      <button class="back-btn text" data-nav="16-scholarship.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to May
      </button>
      <span class="counter">05a · DETAIL</span>
    </div>

    <span class="pill scholar">🎓 SCHOLARSHIP · DUE APR 30</span>
    <h2 class="q-title">Deutschlandstipendium</h2>

    <div class="letter-card">
      <div class="head"><span>AGENT DRAFT · MOTIVATION LETTER</span><span class="ready">ready</span></div>
      <blockquote id="letter"></blockquote>
      <div class="meta">drafted from your thesis intro · 312 words · you can edit anything</div>
    </div>

    <div class="next-card">
      <div class="head">WHAT HAPPENS IF YOU APPROVE</div>
      <div class="row"><span class="n">1.</span><span>Agent submits via TUM portal</span></div>
      <div class="row"><span class="n">2.</span><span>Confirmation email back to you</span></div>
      <div class="row"><span class="n">3.</span><span>Decision by Jul 15 — I'll remind you</span></div>
    </div>

    <div class="spacer"></div>

    <div class="btn-row">
      <button class="btn btn-outline" data-nav="16-scholarship.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit draft
      </button>
      <button class="btn btn-accent" data-nav="18-profile.html">
        Review & apply
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>
</div>
<script src="../shared/prototype.js"></script>
<script>
document.getElementById('statusbar').innerHTML = WP.buildStatusBar();

const text = '"I\'m applying because Mars robotics is the one line of work I can\'t talk myself out of. My thesis at TUM (Prof. Walter, LRT) prototypes autonomous landers — the next step is…"';
WP.typeInto('#letter', text, { speed: 20 });

WP.scheduleAdvance(6500, '18-profile.html');
</script>
</body>
</html>
