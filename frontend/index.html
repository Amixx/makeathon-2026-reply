<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Co-Pilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Handle SPA redirects from 404.html on GitHub Pages -->
    <script>
      (function(){
        var r = window.location.search.match(/^\?\/(.*)/);
        if (r) {
          var decoded = r[1].split('&').map(function(s){ return s.replace(/~and~/g, '&'); });
          var path = decoded[0];
          var search = decoded.length > 1 ? '?' + decoded.slice(1).join('&') : '';
          window.history.replaceState(null, '',
            window.location.pathname + (path ? path : '') + search + window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
